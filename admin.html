<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CROVEX Admin</title>
  <style>
    :root{--bg:#050510;--accent:#4a4aff;--panel-bg:rgba(0,0,0,0.45)}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#fff;
      display:flex;align-items:center;justify-content:center;min-height:100vh;
    }
    .container{
      width:360px;max-width:94vw;padding:18px;border-radius:12px;background:var(--panel-bg);
      border:1px solid rgba(74,74,255,0.18);box-shadow:0 8px 30px rgba(0,0,0,0.6);text-align:center;
      backdrop-filter:blur(8px);
    }
    .avatar{width:110px;height:110px;border-radius:50%;margin:0 auto 12px;border:3px solid var(--accent);overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover;display:block}
    #aiText{min-height:56px;margin-bottom:12px;font-size:14px;white-space:pre-line}
    input{width:92%;padding:10px;border-radius:8px;border:1px solid rgba(74,74,255,0.12);background:#0a0a20;color:#fff;margin-bottom:10px}
    button{width:95%;padding:10px;border-radius:8px;background:var(--accent);border:none;color:#fff;font-weight:700;cursor:pointer}
    #error{min-height:20px;color:#ff6b6b;margin-top:8px}
    #adminPanel{display:none;text-align:left;margin-top:14px;border-top:1px solid rgba(74,74,255,0.12);padding-top:10px;font-size:14px}
    .admin-notice{margin-top:10px;padding:8px;background:rgba(74,74,255,0.06);border-radius:8px}
    @media (prefers-reduced-motion:reduce){*{transition:none;animation:none}}
  </style>
</head>
<body>
  <main class="container" role="main" aria-labelledby="admin-title">
    <div class="avatar" aria-hidden="false">
      <img src="Image/crovex_profile.png" alt="CROVEX admin avatar" width="110" height="110" loading="lazy">
    </div>

    <h2 id="admin-title" style="font-size:18px;margin-bottom:8px">CROVEX Admin</h2>
    <div id="aiText" aria-live="polite"></div>

    <div id="loginBox" style="display:none">
      <input id="password" type="password" placeholder="Enter password" aria-label="Admin password">
      <button id="authBtn">Authenticate</button>
      <div id="error" role="alert"></div>
    </div>

    <div id="adminPanel" aria-hidden="true">
      <strong>ADMIN PANEL</strong>
      <ul style="margin-top:8px;line-height:1.6">
        <li>CROVEX core placeholder active</li>
        <li>Future AI integration ready</li>
        <li>Logs will appear here later</li>
        <li>System stable</li>
      </ul>
    </div>
  </main>

  <script>
    // Typing effect then show login
    (function(){
      const lines = [
        "CROVEX ADMIN INTERFACE BOOTING...",
        "Neural core online.",
        "Identity verification required.",
        "Please enter password to continue."
      ];
      const el = document.getElementById('aiText');
      const delay = ms => new Promise(r => setTimeout(r, ms));
      async function typeEffect() {
        for (const line of lines) {
          let text = '';
          for (const char of line) {
            text += char;
            el.textContent = text;
            await delay(36);
          }
          await delay(420);
        }
        document.getElementById('loginBox').style.display = 'block';
      }
      typeEffect();
    })();

    // Authentication and optional automation
    (function(){
      const PASSWORD = 'crovexadmin';
      const btn = document.getElementById('authBtn');
      const err = document.getElementById('error');
      btn.addEventListener('click', ()=> {
        const val = document.getElementById('password').value;
        if(val === PASSWORD){
          err.textContent = '';
          document.getElementById('loginBox').style.display = 'none';
          const panel = document.getElementById('adminPanel');
          panel.style.display = 'block';
          panel.setAttribute('aria-hidden','false');
          document.getElementById('aiText').textContent = 'Access granted. Welcome, administrator.';
          // Example automation: fetch admin-data.json if present
          if (window.fetch) {
            fetch('admin-data.json').then(r => {
              if (r.ok) return r.json();
              return null;
            }).then(data => {
              if (data && data.notice) {
                const notice = document.createElement('div');
                notice.className = 'admin-notice';
                notice.textContent = data.notice;
                panel.appendChild(notice);
              }
            }).catch(()=>{/* ignore */});
          }
        } else {
          err.textContent = 'Incorrect password.';
        }
      });
    })();
  </script>
</body>
</html>
