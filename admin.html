<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#02030a" />
  <title>CROVEX AI</title>
  <style>
    :root{
      --bg-dark:#02030a;
      --card-bg:rgba(6,8,24,0.92);
      --accent-cyan:#00f0ff;
      --accent-violet:#8a2be2;
      --muted:#c7c9ff;
      --glass-border:rgba(120,120,255,0.28);
      --max-width:520px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
      background:var(--bg-dark);
      color:#eef0ff;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* Background wrapper (canvas sits behind these) */
    .bg-wrap{position:fixed;inset:0;z-index:-6;overflow:hidden}
    .bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;
      filter:blur(2px) brightness(0.42);transform:scale(1.03);will-change:transform,filter}
    .overlay{position:fixed;inset:0;z-index:-4;background:
      radial-gradient(circle at 10% 10%, rgba(0,255,255,0.12), transparent 30%),
      radial-gradient(circle at 90% 90%, rgba(138,43,226,0.12), transparent 35%),
      linear-gradient(180deg, rgba(0,0,0,0.6), rgba(5,5,20,0.9));mix-blend-mode:screen}

    .shell{width:100%;max-width:var(--max-width);padding:20px;z-index:0;position:relative}
    .card{
      background:var(--card-bg);
      border-radius:18px;
      padding:22px;
      border:1px solid var(--glass-border);
      box-shadow:0 6px 30px rgba(0,0,0,0.6);
      backdrop-filter:blur(12px);
      overflow:hidden;
    }

    .top{display:flex;gap:16px;align-items:center;justify-content:center;margin-bottom:14px;flex-direction:column}
    .avatar{width:112px;height:112px;border-radius:50%;overflow:hidden;border:3px solid rgba(6,8,24,0.95);
      box-shadow:0 6px 22px rgba(0,240,255,0.08);background:linear-gradient(180deg,#071026,#0b0b18);display:block}
    .avatar img{width:100%;height:100%;object-fit:cover;display:block}

    .title{font-size:.78rem;color:var(--accent-cyan);text-align:center;margin-top:8px}
    .name{font-size:1.6rem;font-weight:700;text-align:center;margin-top:6px}
    .bio{font-size:.95rem;color:var(--muted);text-align:center;margin:10px 0 14px}

    .status{display:flex;justify-content:space-between;align-items:center;padding:8px;border-radius:10px;
      background:linear-gradient(90deg, rgba(0,255,255,0.04), rgba(138,43,226,0.06));
      border:1px solid var(--glass-border);font-size:.78rem;margin-bottom:14px}
