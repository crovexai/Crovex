<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CROVEX Background Lab</title>
  <style>
    body {
      margin: 0;
      background: #02030a;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    .brain-wrapper {
      position: fixed;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    .brain-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
      display: block;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="brain-wrapper">
    <img src="Image/brain-full.jpeg?v=20260317-1" class="brain-bg" alt="CROVEX brain" />
    <canvas id="pulseCanvas"></canvas>
  </div>

  <script src="js/crovex-brain.js?v=20260317-25"></script>
</body>
</html>
