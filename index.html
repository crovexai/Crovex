<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CROVEX AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      color: #f5f5ff;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #02030a;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url("Image/techbrain.png.webp");
      background-size: cover;
      background-position: center;
      filter: blur(2px) brightness(0.4);
      transform: scale(1.05);
      z-index: -3;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(0,255,255,0.25), transparent 55%),
                  radial-gradient(circle at bottom, rgba(138,43,226,0.35), transparent 60%),
                  linear-gradient(135deg, rgba(0,0,0,0.8), rgba(5,5,20,0.95));
      mix-blend-mode: screen;
      opacity: 0.9;
      z-index: -2;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(0,255,255,0.4) 0, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(138,43,226,0.4) 0, transparent 45%);
      opacity: 0.25;
      animation: floatGlow 18s ease-in-out infinite alternate;
    }

    @keyframes floatGlow {
      0% { transform: translate3d(0,0,0) scale(1); }
      100% { transform: translate3d(-20px,-10px,0) scale(1.05); }
    }

    .shell { width: 100%; max-width: 480px; padding: 24px; }

    .card {
      background: rgba(5,7,20,0.9);
      border-radius: 24px;
      padding: 28px 22px;
      border: 1px solid rgba(120,120,255,0.4);
      box-shadow: 0 0 40px rgba(0,255,255,0.15), 0 0 80px rgba(138,43,226,0.25);
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease-out;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: conic-gradient(from 180deg, rgba(0,255,255,0.2), rgba(138,43,226,0.35), rgba(0,255,255,0.2));
      opacity: 0.18;
      animation: spin 26s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-wrap { display: flex; justify-content: center; margin-bottom: 18px; }

    .avatar-ring {
      width: 132px; height: 132px; border-radius: 50%; padding: 4px;
