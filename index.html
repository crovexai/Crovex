<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CROVEX AI Brain Pulse</title>

  <style>
    html { background: #02030a; }
    body {
      margin: 0;
      background: transparent;
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    /* CROVEX profile logo overlay */
    .crovex-logo {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 120px;
      opacity: 0.9;
      pointer-events: none;
    }
  </style>
</head>

<script>
(function(){
  const out = document.createElement('div');
  out.id = 'crovex-debug';
  Object.assign(out.style, {
    position:'fixed', right:'12px', top:'12px', zIndex:99999,
    background:'rgba(0,0,0,0.6)', color:'#fff', padding:'10px',
    fontFamily:'monospace', fontSize:'13px', borderRadius:'8px', maxWidth:'320px'
  });
  document.body.appendChild(out);
  function log(k,v){
    const el = document.getElementById('dbg-'+k) || document.createElement('div');
    el.id = 'dbg-'+k;
    el.textContent = k + ': ' + v;
    out.appendChild(el);
  }
  const checks = [
    {name:'js', url:'js/crovex-brain.js'},
    {name:'brain', url:'Image/brain-full.jpeg'},
    {name:'chipMask', url:'Image/chip-mask.png'},
    {name:'aiMask', url:'Image/ai-brain-mask.png'},
    {name:'nerveMask', url:'Image/nerve-mask.png'}
  ];
  checks.forEach(c=>{
    fetch(c.url, {method:'HEAD'}).then(r=>{
      log(c.name, r.status + ' ' + (r.ok ? 'OK' : 'ERR'));
    }).catch(()=>{ log(c.name, 'fetch error'); });
  });
  setTimeout(()=>{
    const c = document.getElementById('crovexBrain');
    if(!c) log('canvas','MISSING');
    else log('canvas','found w='+c.width+' h='+c.height+' z='+c.style.zIndex);
  }, 800);
})();
</script>

  <body>

  <img src="Image/crovex_profile.png" class="crovex-logo" alt="CROVEX logo" />

  <script src="js/crovex-brain.js"></script>
</body>
</html>
