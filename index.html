<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CROVEX AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      color: #f5f5ff;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #02030a;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url("Image/crovex_background.png");
      background-size: cover;
      background-position: center;
      filter: blur(2px) brightness(0.4);
      transform: scale(1.05);
      z-index: -3;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(0,255,255,0.25), transparent 55%),
                  radial-gradient(circle at bottom, rgba(138,43,226,0.35), transparent 60%),
                  linear-gradient(135deg, rgba(0,0,0,0.8), rgba(5,5,20,0.95));
      mix-blend-mode: screen;
      opacity: 0.9;
      z-index: -2;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(0,255,255,0.4) 0, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(138,43,226,0.4) 0, transparent 45%);
      opacity: 0.25;
      animation: floatGlow 18s ease-in-out infinite alternate;
    }

    @keyframes floatGlow {
      0% { transform: translate3d(0,0,0) scale(1); }
      100% { transform: translate3d(-20px,-10px,0) scale(1.05); }
    }

    .shell { width: 100%; max-width: 480px; padding: 24px; }

    .card {
      background: rgba(5,7,20,0.9);
      border-radius: 24px;
      padding: 28px 22px;
      border: 1px solid rgba(120,120,255,0.4);
      box-shadow: 0 0 40px rgba(0,255,255,0.15), 0 0 80px rgba(138,43,226,0.25);
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease-out;
    }

    .avatar-wrap { display: flex; justify-content: center; margin-bottom: 18px; }

    .avatar-ring {
      width: 132px; height: 132px; border-radius: 50%; padding: 4px;
      background: conic-gradient(from 220deg, #00ffff, #8a2be2, #00ffff);
      box-shadow: 0 0 25px rgba(0,255,255,0.6), 0 0 40px rgba(138,43,226,0.7);
      animation: pulseRing 3.5s ease-in-out infinite;
    }

    @keyframes pulseRing {
      0%,100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }

    .avatar {
      width: 100%; height: 100%; border-radius: 50%;
      overflow: hidden; border: 3px solid rgba(5,7,20,0.95);
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .title { text-align: center; font-size: 0.78rem; color: #7ddcff; margin-bottom: 6px; }
    .name { text-align: center; font-size: 1.7rem; font-weight: 700; margin-bottom: 6px; }
    .bio { text-align: center; font-size: 0.95rem; color: #c7c9ff; margin-bottom: 18px; }

    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.75rem; padding: 8px 10px;
      border-radius: 10px;
      background: linear-gradient(90deg, rgba(0,255,255,0.08), rgba(138,43,226,0.12));
      border: 1px solid rgba(120,120,255,0.4);
      margin-bottom: 18px;
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #00ff9d; box-shadow: 0 0 10px #00ff9d;
    }

    .links { display: flex; flex-direction: column; gap: 10px; }

    .link-btn {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 14px; border-radius: 12px;
      border: 1px solid rgba(120,120,255,0.5);
      background: radial-gradient(circle at top left, rgba(0,255,255,0.16), rgba(5,7,20,0.96));
      color: white; text-decoration: none; font-size: 0.95rem;
      transition: 0.16s;
    }

    .link-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(0,255,255,0.25), 0 0 28px rgba(138,43,226,0.3);
    }

    .console {
      font-family: monospace;
      font-size: 0.78rem;
      background: rgba(3,5,18,0.95);
      border-radius: 12px;
      border: 1px solid rgba(120,120,255,0.4);
      padding: 10px 12px;
      max-height: 120px;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="bg-overlay"></div>
<div class="particles"></div>

<div class="shell">
  <div class="card">
    <div class="avatar-wrap">
      <div class="avatar-ring">
        <div class="avatar">
          <img src="Image/crovex_profile.png">
        </div>
      </div>
    </div>

    <div class="title">Autonomous Intelligence System</div>
    <div class="name">CROVEX AI</div>
    <div class="bio" id="bio"></div>

    <div class="status-bar">
      <div><span class="status-dot"></span> System status: Online</div>
      <div id="version">v1.0.0</div>
    </div>

    <div class="links">
      <a class="link-btn" href="https://tiktok.com/">TikTok ↗</a>
      <a class="link-btn" href="https://facebook.com/">Facebook ↗</a>
      <a class="link-btn" href="https://instagram.com/">Instagram ↗</a>
      <a class="link-btn" href="https://twitter.com/">Twitter ↗</a>
      <a class="link-btn" href="https://github.com/">GitHub ↗</a>
      <a class="link-btn" href="admin.html">Admin Access ↗</a>
    </div>

    <div class="console" id="console">
      <div>> Initializing CROVEX AI…</div>
    </div>
  </div>
</div>

<script>
  const bioText = "Building next-generation autonomous AI systems for the future.";
  let i = 0;
  function typeBio() {
    if (i <= bioText.length) {
      document.getElementById("bio").textContent = bioText.slice(0, i++);
      setTimeout(typeBio, 40);
    }
  }
  setTimeout(typeBio, 600);
</script>

</body>
</html>
