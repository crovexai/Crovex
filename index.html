<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CROVEX AI Brain Pulse</title>

  <style>
    body {
      margin: 0;
      background: #02030a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    .brain-wrapper {
      position: relative;
      width: min(92vw, 760px);
      height: min(92vw, 760px);
      max-height: 92vh;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }

    .brain-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 1;
      display: block;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .crovex-logo {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 120px;
      opacity: 0.9;
      pointer-events: none;
      z-index: 3;
    }
  </style>
</head>

<body>
  <div class="brain-wrapper">
    <img src="Image/crovex_profile.png?v=20260317-1" class="crovex-logo" alt="CROVEX logo" />
    <img src="Image/brain-full.jpeg?v=20260317-1" class="brain-bg" alt="CROVEX brain" />
    <canvas id="pulseCanvas"></canvas>
  </div>

  <script src="js/crovex-brain.js?v=20260317-5"></script>
</body>
</html>
